name: Codex PR Review

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: codex-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Checkout PR merge commit
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Build Codex review prompt
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          cp .github/codex/pr-review-prompt.md "$RUNNER_TEMP/codex-pr-review-prompt.md"
          {
            printf "\n\nPR context\n"
            printf "- Repository: %s\n" "$GITHUB_REPOSITORY"
            printf "- PR number: #%s\n" "$PR_NUMBER"
            printf "- Base ref: %s\n" "$PR_BASE_REF"
            printf "- Head ref: %s\n" "$PR_HEAD_REF"
            printf "- Base SHA: %s\n" "$PR_BASE_SHA"
            printf "- Head SHA: %s\n" "$PR_HEAD_SHA"
            printf "\nPull request title\n%s\n" "$PR_TITLE"
            printf "\nPull request body\n%s\n" "${PR_BODY:-No body provided.}"
            printf "\nKey git commands\n"
            printf "- git diff --stat %s...%s\n" "$PR_BASE_SHA" "$PR_HEAD_SHA"
            printf "- git diff --unified=0 %s...%s\n" "$PR_BASE_SHA" "$PR_HEAD_SHA"
            printf "- git log --oneline %s...%s\n" "$PR_BASE_SHA" "$PR_HEAD_SHA"
          } >> "$RUNNER_TEMP/codex-pr-review-prompt.md"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ runner.temp }}/codex-pr-review-prompt.md
          sandbox: read-only
          safety-strategy: drop-sudo

  post-feedback:
    needs: codex-review
    if: ${{ needs.codex-review.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Upsert Codex review comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = "<!-- codex-pr-review -->";
            const body = [
              marker,
              "## Codex PR Review",
              "",
              process.env.CODEX_FINAL_MESSAGE,
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  notify-approval:
    needs: [codex-review, post-feedback]
    if: >-
      ${{
        !github.event.pull_request.draft &&
        needs.codex-review.result == 'success' &&
        (needs.post-feedback.result == 'success' || needs.post-feedback.result == 'skipped')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Send Telegram approval notification
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_ACTION: ${{ github.event.action }}
          PR_REPO: ${{ github.repository }}
          CODEX_FINAL_MESSAGE: ${{ needs.codex-review.outputs.final_message }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PY'
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()

          if not token or not chat_id:
            raise SystemExit("Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID")

          codex_message = (os.environ.get("CODEX_FINAL_MESSAGE") or "").strip()
          if codex_message == "No actionable findings.":
            review_summary = "Codex review found no actionable issues."
          elif codex_message:
            review_summary = "Codex review posted feedback on the PR."
          else:
            review_summary = "Codex review completed."

          body = "\n".join(
            [
              "PR approval needed.",
              f"Repository: {os.environ['PR_REPO']}",
              f"PR: #{os.environ['PR_NUMBER']} - {os.environ['PR_TITLE']}",
              f"Author: {os.environ['PR_AUTHOR']}",
              f"Trigger: {os.environ['PR_ACTION']}",
              review_summary,
              os.environ["PR_URL"],
            ]
          )

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          payload = urllib.parse.urlencode({"chat_id": chat_id, "text": body}).encode()

          with urllib.request.urlopen(url, data=payload) as response:
            if response.status >= 300:
              raise RuntimeError(
                f"Telegram notification failed with status {response.status}"
              )

          print("Sent Telegram notification.")
          PY
